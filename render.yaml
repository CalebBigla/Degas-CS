services:
  # Frontend Static Site
  - type: web
    name: degas-cs-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      # Serve static assets without rewriting
      - type: route
        source: /assets/*
        destination: /assets/*
      - type: route
        source: /*.js
        destination: /*.js
      - type: route
        source: /*.css
        destination: /*.css
      - type: route
        source: /*.json
        destination: /*.json
      - type: route
        source: /*.svg
        destination: /*.svg
      - type: route
        source: /*.png
        destination: /*.png
      - type: route
        source: /*.ico
        destination: /*.ico
      # All other routes: rewrite to index.html for SPA routing
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend Web Service
  - type: web
    name: degas-cs-backend
    env: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
